# .github/workflows/ci.yml
name: Continuous Integration & Delivery

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancela runs anteriores do mesmo PR para economizar minutos do Actions
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # FASE 1A: LINT — Backend (Python)
  # ============================================================
  backend-lint:
    name: "🐍 Backend — Lint (Black + Flake8)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Cache do pip e do virtualenv do Pipenv para acelerar runs futuras
      - name: Cache do Pipenv
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.local/share/virtualenvs
          key: pipenv-${{ runner.os }}-${{ hashFiles('backend/Pipfile.lock') }}
          restore-keys: |
            pipenv-${{ runner.os }}-

      - name: Instalar Pipenv
        run: pip install pipenv

      - name: Instalar Dependências (incluindo dev)
        run: pipenv install --dev

      - name: Verificar Formatação (Black)
        run: pipenv run black --check .

      - name: Verificar Regras (Flake8)
        run: pipenv run flake8 .

  # ============================================================
  # FASE 1B: LINT — Frontend (TypeScript + ESLint)
  # ============================================================
  frontend-lint:
    name: "⚛️ Frontend — Lint (ESLint)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "./frontend/package-lock.json"

      - name: Instalar Dependências
        # --legacy-peer-deps: resolve conflito de peer deps entre React 18 e @testing-library/react
        run: npm install --legacy-peer-deps

      - name: Executar Linter (ESLint)
        run: npm run lint

  # ============================================================
  # FASE 2A: TESTES — Backend (Pytest + AsyncIO)
  # ============================================================
  backend-test:
    name: "🧪 Backend — Testes (Pytest)"
    runs-on: ubuntu-latest
    needs: [backend-lint]
    defaults:
      run:
        working-directory: ./backend

    env:
      # SQLite em memória: zero dependência de infraestrutura no CI
      DATABASE_URL: "sqlite+aiosqlite:///:memory:"
      SECRET_KEY: "ci-test-secret-key-not-for-production"
      ALGORITHM: "HS256"
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      GEMINI_API_KEY: ""
      GROQ_API_KEY: ""

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache do Pipenv
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.local/share/virtualenvs
          key: pipenv-${{ runner.os }}-${{ hashFiles('backend/Pipfile.lock') }}
          restore-keys: |
            pipenv-${{ runner.os }}-

      - name: Instalar Pipenv
        run: pip install pipenv

      - name: Instalar Dependências (incluindo dev)
        run: pipenv install --dev

      - name: Executar Testes com Cobertura
        run: |
          pipenv run pytest \
            --tb=short \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -q

      # Publica o relatório de cobertura como artefato para inspeção
      - name: Upload do Relatório de Cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage-report
          path: backend/coverage.xml
          retention-days: 7

  # ============================================================
  # FASE 2B: TESTES — Frontend (Vitest)
  # ============================================================
  frontend-test:
    name: "🧪 Frontend — Testes (Vitest)"
    runs-on: ubuntu-latest
    needs: [frontend-lint]
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "./frontend/package-lock.json"

      - name: Instalar Dependências
        run: npm install --legacy-peer-deps

      - name: Executar Testes (Vitest)
        run: npm run test -- --run --reporter=verbose

  # ============================================================
  # FASE 3A: DEPLOY — Backend (Render via Deploy Hook)
  # Condicional: apenas em push para main, após lint + testes passarem
  # ============================================================
  deploy-backend:
    name: "🚀 Deploy Backend → Render"
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-test, frontend-lint, frontend-test]
    # Só executa em push direto para main (não em PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: ${{ vars.RENDER_SERVICE_URL }}

    steps:
      - name: Disparar Deploy via Render Deploy Hook
        run: |
          RESPONSE=$(curl --silent --show-error --fail-with-body \
            --max-time 30 \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          echo "Render response: $RESPONSE"

      - name: Aguardar Propagação do Deploy
        run: |
          echo "Deploy disparado. O Render levará ~2-5 minutos para concluir o build."
          echo "Acompanhe em: https://dashboard.render.com"

  # ============================================================
  # FASE 3B: DEPLOY — Frontend (Vercel)
  # ============================================================
  deploy-frontend:
    name: "🚀 Deploy Frontend → Vercel"
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-test, frontend-lint, frontend-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: ${{ vars.VERCEL_PRODUCTION_URL }}
    
    # Injeção das credenciais do projeto Vercel
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "./frontend/package-lock.json"

      - name: Instalar Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull das Configurações do Projeto (Vercel)
        run: |
          vercel pull --yes \
            --environment=production \
            --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: ./frontend

      - name: Build de Produção (Vercel)
        run: |
          vercel build --prod \
            --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: ./frontend

      - name: Deploy para Produção (Vercel)
        run: |
          vercel deploy --prebuilt --prod \
            --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: ./frontend