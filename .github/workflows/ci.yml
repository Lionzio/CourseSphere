name: Continuous Integration (CI)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # --- Verificação do Backend (Python) ---
  backend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Pipenv
        run: pip install pipenv

      - name: Instalar Dependências
        run: pipenv install --dev

      - name: Verificar Estilo (Black)
        run: pipenv run black --check .

      - name: Verificar Regras (Flake8)
        run: pipenv run flake8 .

  # --- Verificação do Frontend (React + TS) ---
  frontend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Instalar Dependências
        # BUGFIX: --legacy-peer-deps ignora os conflitos estritos de peer dependencies entre o React 19 e o @testing-library/react 14
        run: npm install --legacy-peer-deps

      - name: Executar Linter (ESLint)
        run: npm run lint